# Default config
# https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.conf

# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Create your files separately and then link them to this file like this:

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,1
monitor=eDP-1,1920x1080,0x0,1,transform,0
monitor=HDMI-A-1,3840x2160,1920x-1080,1.5 # LG 4k
# monitor=HDMI-A-1,1920x1080,0x-1080,1 # dLG 1080

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
# Set programs that you use
$terminal = alacritty
$fileManager = thunar .
$menu = rofi -show drun -theme ~/.config/rofi/rofi.rosi
$ss = grim -g "$(slurp)" - | wl-copy
$lock = hyprlock
$web = librewolf
$clip = cliphist list | rofi -dmenu -i -p clipboard -theme ~/.config/rofi/rofi2.rosi | cliphist decode | wl-copy
$scriber = pkill -SIGUSR1 wayscriber

#################
### AUTOSTART ###
#################

# exec-once = $terminal btop
# exec-once = nm-applet &
# exec-once = /home/me/.config/hypr/launch-cava-eww.sh
# exec-once = wayscriber --daemon
exec-once = kdeconnectd
exec-once = iio-hyprland eDP-1
exec-once = hyprctl setcursor Adwaita 96
exec-once = swww-daemon
exec-once = mako
exec-once = /home/me/.config/hypr/switch-random-wallpaper.sh
exec-once = /home/me/.config/hypr/rotate-random-wallpaper.sh
exec-once = /home/me/.config/hypr/launch-cava-bg.sh
exec-once = waybar
exec-once = wl-paste --type text --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &
exec-once = hypridle
exec-once = /home/me/.config/hypr/bgm-power-monitor.sh
exec-once = sleep 3; wayscriber --daemon
exec = ~/.config/hypr/load-touchscreen.sh

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,96
env = XCURSOR_THEME Adwaita
env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt apps
env = GTK_THEME,adw-gtk3-dark
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }
# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 7
    gaps_out = 14
    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    # col.active_border = $active_border
    # col.inactive_border = $inactive_border

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = true

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2
    dim_inactive = true
    dim_strength = .1

    # Change transparency of focused and unfocused windows
    active_opacity = .97
    inactive_opacity = .87
    blur {
        enabled = false
    }

    shadow {
      enabled = false
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.05, 1.2,    0.2, 1
    bezier = eoqdef,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    easeOutQuint
    animation = border,        1,     7,     easeOutQuint

    animation = windowsIn,     1,     5,     easeOutQuint,       gnomed
    animation = windowsMove,   1,     5,     easeOutQuint,       slide
    animation = windowsOut,    1,     5,     almostLinear,       slide bottom

    animation = fadeIn,        1,     5,  	 easeOutQuint
    animation = fade,          1,     5,     easeOutQuint
    animation = fadeOut,       1,     5,     easeOutQuint

    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     2,     easeOutQuint, 		fade
    animation = layersOut,     1,     1.5,   easeOutQuint,   	fade
    animation = fadeLayersIn,  1,     1.79,  easeOutQuint
    animation = fadeLayersOut, 1,     1.39,  easeOutQuint
    animation = fadePopupsIn,  1,     1.39,  easeOutQuint
    animation = fadePopupsOut, 1,     1.39,  easeOutQuint
    animation = fadeDpms, 	   1,     1.39,  easeOutQuint

    animation = workspaces,    1,     4,     easeOutQuint, 			slidefade 20%
    animation = workspacesIn,  1,     4,     easeOutQuint, 			slidefade 20%
    animation = workspacesOut, 1,     4,     easeOutQuint, 			slidefade 20%

    animation = zoomFactor,    1,     2,     easeOutQuint
    animation = monitorAdded,  1,     70,    eoqdef
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1
    disable_hyprland_logo = true # If true disables the random hyprland logo
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = pl
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }

}

# See https://wiki.hypr.land/Configuring/Gestures
# gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more

###################
### KEYBINDINGS ###
###################

source = ~/.config/hypr/keybinds.conf

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# windowrulev2 = float, class:^(cava-overlay|foot)$
# windowrulev2 = noborder, class:^(cava-overlay|foot)$
# windowrulev2 = noanim, class:^(cava-overlay|foot)$
# windowrulev2 = nofocus, class:^(cava-overlay|foot)$
# windowrulev2 = pin, class:^(cava-overlay|foot)$
# windowrulev2 = move 643 920, class:^(cava-overlay|foot)$
# windowrulev2 = size 640 160, class:^(cava|kitty)$
# windowrulev2 = opacity 1.0 override 1.0 override, class:^(cava-overlay|foot)$
# windowrulev2 = float, class:^(glava-overlay)$
# windowrulev2 = noborder, class:^(glava-overlay)$
# windowrulev2 = noanim, class:^(glava-overlay)$
# windowrulev2 = nofocus, class:^(glava-overlay)$
# windowrulev2 = pin, class:^(glava-overlay)$
# windowrulev2 = opacity 1.0 override 1.0 override, class:^(glava-overlay)$

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
