###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, killactive,
# bind = ALT, F4, forcekillactive,

# APPS
bind = $mainMod, M, exec, $lock
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, exec, $terminal
bind = $mainMod, X, exec, $web
bindir = ,SUPER_L, exec, $menu
bind = $mainMod SHIFT, S, exec, $ss
bind = $mainMod, V, exec, $clip
bind = $mainMod, F3, exec, $scriber

bind = $mainMod, F10, exec, bash /home/me/.config/hypr/switch-random-wallpaper.sh
bind = $mainMod, F11, exec, bash ~/.config/hypr/waybar-toggle.sh
bind = $mainMod, F12, exec, /home/me/.config/hypr/bgm-power-monitor.sh toggle
bind = $mainMod, O, exec, /home/me/.config/hypr/toggle-wvkbd.sh
bind = $mainMod, INSERT, exec, /home/me/.config/hypr/bgm-power-monitor.sh skip

# TOGGLES
bind = $mainMod, T, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, U, togglesplit, # dwindle
bind = $mainMod, F, fullscreen, # dwindle

# MOVE FOCUS, super jikl
bind = $mainMod, J, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, I, movefocus, u
bind = $mainMod, K, movefocus, d

# RESISE WINDOWS, super shift ctrl jikl
binde = $mainMod CTRL, l, resizeactive, 5% 0%
binde = $mainMod CTRL, j, resizeactive, -5% 0
binde = $mainMod CTRL, i, resizeactive, 0% 5%
binde = $mainMod CTRL, k, resizeactive, 0% -5%

# MOVE WINDOWS, super shift jikl
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, J, movewindow, l
bind = $mainMod SHIFT, K, movewindow, d
bind = $mainMod SHIFT, I, movewindow, u

# SWITCH WORKSPACES, super+123as
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, A, workspace, e-1
bind = $mainMod, S, workspace, e+1

# MOVE ACTIVE TO WORKSPACE, SUPER SHIFT 123as
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e3 -n0 set 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e3 -n0 set 10%-

# REMOVE BINDS ON SUPER + DEL
bind = $mainMod, delete, submap, clean
submap = clean
bind = $mainMod, delete, submap, reset
submap = reset


# ZOOM
binde = $mainMod, F2, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod, F1, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

# LID
bindl=,switch:on:Lid Switch,exec,hyprlock
# bindl=,switch:on:Lid Switch,exec, sh -c 'hyprlock; systemctl suspend'
