WV_KBD_BIN="wvkbd-mobintl"

# Portrait and landscape heights in pixels.
WV_KBD_HEIGHT=420
WV_KBD_LANDSCAPE_HEIGHT=280

# Larger font makes keycaps easier to read on touch screens.
WV_KBD_FONT="DejaVu Sans 26"

# Optional polish.
WV_KBD_RADIUS=14

# Keep the layer set simpler so keys stay larger.
WV_KBD_LAYERS="full,special,emoji"
WV_KBD_LANDSCAPE_LAYERS="landscape,landscapespecial"
