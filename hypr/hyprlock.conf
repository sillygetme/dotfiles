general {
    hide_cursor = true
    # immediate_render = true
}

animations {
  enabled = true
}

bezier = linear, 0, 1.2, .8, 1
animation = fadeOut, 1, 5, linear
animation = fadeIn, 1, 5, linear

background {
    monitor =
    path = /home/me/.cache/hyprlock-wallpaper
    blur_passes = 2
    blur_size = 2
    noise = 0.0117
    contrast = 0.8
    brightness = 0.6
    vibrancy = 0.21
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] date "+%a, %b %d '%y"
    color = rgba(ff, ff, ff, 1.0)
    font_family = JetBrains Mono NL
    font_size = 20
    position = 0, 250
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date '+%H'
    color = rgba(ff, ff, ff, 1.0)
    font_size = 150
    font_family = JetBrains Mono NL
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date '+%S'
    color = rgba(ff, ff, ff, 1.0)
    font_size = 40
    font_family = JetBrains Mono NL
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date '+%M'
    color = rgba(ff, ff, ff, 1.0)
    font_size = 150
    font_family = JetBrains Mono NL
    position = 0, -120
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 350, 56
    outline_thickness = 3
    inner_color = rgba(20, 24, 31, 0.3)
    outer_color = rgba(160, 190, 255, 0.85)
    font_color = rgba(235, 239, 244, 1.0)
    check_color = rgba(160, 190, 255, 1.0)
    fail_color = rgba(255, 120, 120, 1.0)
    font_family = JetBrains Mono NL
    placeholder_text = 123
    fade_on_empty = true
    hide_input = true
    dots_center = true
    rounding = 12
    position = 0, -270
    halign = center
    valign = center
}
